<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Imprimir Pedidos</title>
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
  apiKey: "AIzaSyB3_xJf1GSEgjkEtrxb_taYTXJ8NIANUVQ",
  authDomain: "savea-doceria.firebaseapp.com",
  projectId: "savea-doceria",
  storageBucket: "savea-doceria.appspot.com",
  messagingSenderId: "320876567662",
  appId: "1:320876567662:web:5ec737d33559b204475a7f",
  measurementId: "G-8MNVG5DRP5"
};

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function carregarPedidos() {
            const querySnapshot = await getDocs(collection(db, "pedidos"));
            const container = document.getElementById('lista');
            querySnapshot.forEach((doc) => {
                const data = doc.data();
                container.innerHTML += `<p>Cliente: ${data.cliente?.nome} | Total: ${data.total}</p><hr>`;
            });
        }
        carregarPedidos();
    </script>
</head>
<body>
    <h1>Pedidos</h1>
    <button onclick="window.print()">Imprimir Agora</button>
    <div id="lista"></div>
</body>
</html>
